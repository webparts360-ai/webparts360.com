<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Practical AI for HR Professionals | CRN Solutions</title>
  <meta name="description" content="A 2-day, HRDF-claimable Practical AI masterclass for HR teams. Learn to use tools like ChatGPT, Claude, and Gemini to transform recruitment, operations, and learning programmes." />

  <link rel="preconnect" href="https://api.fontshare.com" />
  <link href="https://api.fontshare.com/v2/css?f[]=general-sans@400,500,600,700&f[]=cabinet-grotesk@500,700,800&display=swap" rel="stylesheet" />

  <style>
    :root, [data-theme="light"] {
      --text-xs: clamp(0.75rem, 0.7rem + 0.25vw, 0.875rem);
      --text-sm: clamp(0.875rem, 0.8rem + 0.35vw, 1rem);
      --text-base: clamp(1rem, 0.95rem + 0.25vw, 1.125rem);
      --text-lg: clamp(1.125rem, 1rem + 0.75vw, 1.5rem);
      --text-xl: clamp(1.5rem, 1.2rem + 1.25vw, 2.25rem);
      --text-2xl: clamp(2rem, 1.2rem + 2.5vw, 3.5rem);

      --space-1: 0.25rem;
      --space-2: 0.5rem;
      --space-3: 0.75rem;
      --space-4: 1rem;
      --space-5: 1.25rem;
      --space-6: 1.5rem;
      --space-8: 2rem;
      --space-10: 2.5rem;
      --space-12: 3rem;
      --space-16: 4rem;
      --space-20: 5rem;

      --color-bg: #f7f6f2;
      --color-surface: #fbfbf9;
      --color-surface-2: #f1efe9;
      --color-border: #d4d1ca;
      --color-divider: #dcd9d5;
      --color-text: #28251d;
      --color-text-muted: #6f6c65;
      --color-primary: #01696f;
      --color-primary-hover: #0c4e54;
      --color-primary-soft: #d9ecea;
      --color-accent: #1e3a5f;

      --radius-md: 0.5rem;
      --radius-lg: 0.875rem;
      --radius-xl: 1.25rem;
      --radius-full: 9999px;

      --shadow-sm: 0 1px 2px rgba(40,37,29,0.06);
      --shadow-md: 0 8px 24px rgba(40,37,29,0.08);

      --content-default: 1120px;
      --transition: 180ms cubic-bezier(0.16, 1, 0.3, 1);
      --font-body: "General Sans","Inter",sans-serif;
      --font-display: "Cabinet Grotesk","Inter",sans-serif;
    }

    [data-theme="dark"] {
      --color-bg: #171614;
      --color-surface: #1c1b19;
      --color-surface-2: #22211f;
      --color-border: #393836;
      --color-divider: #262523;
      --color-text: #cdccca;
      --color-text-muted: #9b9892;
      --color-primary: #4f98a3;
      --color-primary-hover: #6eb0ba;
      --color-primary-soft: #223335;
      --color-accent: #88a8d8;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.2);
      --shadow-md: 0 8px 24px rgba(0,0,0,0.28);
    }

    *,*::before,*::after { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: var(--font-body);
      font-size: var(--text-base);
      line-height: 1.6;
      background: var(--color-bg);
      color: var(--color-text);
    }
    img { max-width: 100%; display: block; }
    a { color: inherit; text-decoration: none; }

    .container {
      width: min(calc(100% - 2rem), var(--content-default));
      margin-inline: auto;
    }

    /* Motion */
    html.js [data-reveal] {
      opacity: 0;
      transform: translateY(18px);
      transition:
        opacity 700ms cubic-bezier(0.16, 1, 0.3, 1),
        transform 700ms cubic-bezier(0.16, 1, 0.3, 1);
      transition-delay: var(--reveal-delay, 0ms);
    }
    html.js [data-reveal].is-visible {
      opacity: 1;
      transform: none;
    }
    @media (prefers-reduced-motion: reduce) {
      html.js [data-reveal] {
        opacity: 1 !important;
        transform: none !important;
        transition: none !important;
      }
    }

    /* Header / nav */
    .site-header {
      position: sticky;
      top: 0;
      z-index: 10;
      backdrop-filter: blur(14px);
      background: color-mix(in srgb, var(--color-bg) 88%, transparent);
      border-bottom: 1px solid rgba(127,127,127,0.14);
      transition:
        box-shadow 180ms cubic-bezier(0.16,1,0.3,1),
        background 180ms cubic-bezier(0.16,1,0.3,1);
    }
    .site-header.is-scrolled {
      box-shadow: 0 10px 30px rgba(40,37,29,0.08);
    }

    .header-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-4);
      min-height: 78px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      font-weight: 700;
    }
    .brand-logo-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 42px;
      height: 42px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--color-surface), var(--color-surface-2));
      border: 1px solid rgba(127,127,127,0.14);
      overflow: hidden;
      box-shadow: var(--shadow-sm);
    }
    .brand-logo-wrap img {
      width: 28px;
      height: 28px;
      object-fit: contain;
    }
    .brand:hover .brand-logo-wrap,
    .brand:focus-visible .brand-logo-wrap {
      transform: translateY(-1px) scale(1.03);
      transition: transform var(--transition);
    }
    .brand-text strong {
      display: block;
      font-family: var(--font-display);
      font-size: 1rem;
      letter-spacing: 0.02em;
    }
    .brand-text span {
      display: block;
      font-size: var(--text-xs);
      color: var(--color-text-muted);
    }

    .nav-wrap {
      display: flex;
      align-items: center;
      gap: var(--space-4);
    }
    .site-nav {
      display: flex;
      align-items: center;
      gap: var(--space-4);
      font-size: var(--text-sm);
      color: var(--color-text-muted);
    }
    .site-nav a {
      position: relative;
      padding-block: 0.35rem;
    }
    .site-nav a::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: 0;
      width: 100%;
      height: 2px;
      background: var(--color-primary);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform var(--transition);
    }
    .site-nav a:hover,
    .site-nav a:focus-visible {
      color: var(--color-text);
    }
    .site-nav a:hover::after,
    .site-nav a:focus-visible::after {
      transform: scaleX(1);
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: var(--space-3);
    }
    .theme-toggle,
    .menu-toggle {
      min-width: 44px;
      min-height: 44px;
      border-radius: var(--radius-full);
      border: 1px solid rgba(127,127,127,0.2);
      background: var(--color-surface);
      color: var(--color-text);
      cursor: pointer;
      transition: transform var(--transition), background var(--transition);
    }
    .theme-toggle:hover,
    .menu-toggle:hover {
      transform: translateY(-1px);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-2);
      min-height: 48px;
      padding: 0 var(--space-5);
      border-radius: var(--radius-full);
      border: 1px solid transparent;
      font-size: var(--text-sm);
      font-weight: 600;
      transition:
        background var(--transition),
        color var(--transition),
        border-color var(--transition),
        transform var(--transition);
    }
    .btn:hover { transform: translateY(-1px); }
    .btn-primary {
      background: var(--color-primary);
      color: #fff;
    }
    .btn-primary:hover { background: var(--color-primary-hover); }
    .btn-secondary {
      background: var(--color-surface);
      border-color: rgba(127,127,127,0.18);
    }

    /* Layout & sections */
    main section {
      padding-block: clamp(var(--space-12), 8vw, var(--space-24));
    }

    .hero {
      padding-top: var(--space-12);
    }
    .hero-grid {
      display: grid;
      gap: var(--space-10);
      align-items: center;
    }
    .hero h1 {
      margin: var(--space-5) 0 var(--space-4);
      font-family: var(--font-display);
      font-size: clamp(2.4rem, 4.8vw, 3.6rem);
      line-height: 1.02;
      max-width: 26ch;
    }
    .hero p {
      max-width: 62ch;
      color: var(--color-text-muted);
    }
    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-3);
      margin-top: var(--space-5);
    }

    .kicker {
      color: var(--color-primary);
      font-size: var(--text-xs);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 700;
      margin-bottom: var(--space-3);
    }

    .tag-row {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-2);
      margin-top: var(--space-2);
    }
    .tag-pill {
      padding: 0.25rem 0.75rem;
      border-radius: var(--radius-full);
      border: 1px solid rgba(127,127,127,0.18);
      background: var(--color-surface-2);
      font-size: var(--text-xs);
      color: var(--color-text-muted);
    }

    .section-head {
      display: flex;
      justify-content: space-between;
      gap: var(--space-6);
      align-items: flex-end;
      margin-bottom: var(--space-8);
    }
    .section-head h2 {
      margin: 0;
      font-family: var(--font-display);
      font-size: clamp(2rem, 3.2vw, 2.8rem);
      line-height: 1.05;
    }
    .section-head p {
      margin: 0;
      max-width: 54ch;
      color: var(--color-text-muted);
    }

    .grid-3 {
      display: grid;
      gap: var(--space-4);
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .card {
      background: var(--color-surface);
      border-radius: var(--radius-xl);
      border: 1px solid rgba(127,127,127,0.14);
      padding: var(--space-6);
      box-shadow: var(--shadow-sm);
      transition:
        transform var(--transition),
        box-shadow var(--transition),
        border-color var(--transition);
    }
    .card h3 {
      margin: 0 0 var(--space-3);
      font-size: var(--text-lg);
      color: var(--color-primary);
    }
    .card p {
      margin: 0;
      color: var(--color-text-muted);
    }
    .card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-md);
    }

    .two-column {
      display: grid;
      grid-template-columns: minmax(0, 1.2fr) minmax(0, 0.8fr);
      gap: var(--space-8);
      align-items: flex-start;
    }

    .list-card {
      background: var(--color-surface);
      border-radius: var(--radius-xl);
      border: 1px solid rgba(127,127,127,0.14);
      padding: var(--space-6);
      box-shadow: var(--shadow-sm);
    }
    .list-card h3 {
      margin-top: 0;
      margin-bottom: var(--space-3);
      font-size: var(--text-lg);
      color: var(--color-primary);
    }
    .list-card ul {
      margin: 0;
      padding-left: 1.1rem;
      color: var(--color-text-muted);
    }
    .list-card li {
      margin-bottom: 0.35rem;
    }

    .detail-table {
      width: 100%;
      border-collapse: collapse;
      background: var(--color-surface);
      border-radius: var(--radius-xl);
      overflow: hidden;
      border: 1px solid rgba(127,127,127,0.14);
      box-shadow: var(--shadow-sm);
    }
    .detail-table th,
    .detail-table td {
      text-align: left;
      padding: 0.8rem 1.1rem;
      border-bottom: 1px solid var(--color-divider);
      vertical-align: top;
      font-size: var(--text-sm);
    }
    .detail-table th {
      width: 200px;
      background: var(--color-surface-2);
      font-weight: 600;
      color: var(--color-text);
    }
    .detail-table td {
      color: var(--color-text-muted);
    }
    .detail-table tr:last-child th,
    .detail-table tr:last-child td {
      border-bottom: none;
    }

    .quote-block {
      background: var(--color-primary-soft);
      border-radius: var(--radius-xl);
      border: 1px solid rgba(1,105,111,0.2);
      padding: var(--space-6);
      box-shadow: var(--shadow-sm);
      font-size: var(--text-base);
      color: var(--color-text);
    }
    .quote-block strong {
      color: var(--color-primary-hover);
    }

    /* CTA panel */
    .cta-panel {
      background: linear-gradient(135deg, rgba(1,105,111,0.12), rgba(30,58,95,0.08));
      border: 1px solid rgba(127,127,127,0.14);
      border-radius: 28px;
      padding: clamp(var(--space-8), 5vw, var(--space-12));
      box-shadow: var(--shadow-md);
      display: grid;
      grid-template-columns: minmax(0, 1.3fr) minmax(0, 0.7fr);
      gap: var(--space-8);
      align-items: center;
    }
    .cta-panel h2 {
      margin: 0 0 var(--space-3);
      font-family: var(--font-display);
      font-size: clamp(2rem, 3.2vw, 2.8rem);
      line-height: 1.05;
    }
    .cta-panel p {
      margin: 0;
      max-width: 56ch;
      color: var(--color-text-muted);
    }
    .cta-inner-card {
      background: var(--color-surface);
      border-radius: var(--radius-xl);
      border: 1px solid rgba(127,127,127,0.14);
      padding: var(--space-5);
      box-shadow: var(--shadow-sm);
    }
    .cta-inner-card ul {
      margin: 0 0 var(--space-4);
      padding-left: 1.1rem;
      color: var(--color-text-muted);
    }
    .cta-inner-card li {
      margin-bottom: 0.35rem;
      font-size: var(--text-sm);
    }

    /* Footer */
    .site-footer {
      padding: var(--space-10) 0 var(--space-12);
      border-top: 1px solid var(--color-divider);
    }
    .footer-grid {
      display: grid;
      grid-template-columns: 1.3fr 0.7fr;
      gap: var(--space-8);
      align-items: flex-start;
    }
    .footer-links {
      display: grid;
      gap: var(--space-2);
      font-size: var(--text-sm);
      color: var(--color-text-muted);
    }
    .footer-note {
      color: var(--color-text-muted);
      max-width: 56ch;
    }

    @media (min-width: 960px) {
      .hero-grid { grid-template-columns: minmax(0, 1.4fr) minmax(0, 1fr); }
    }

    @media (max-width: 959px) {
      .site-nav {
        position: absolute;
        left: 0;
        right: 0;
        top: 78px;
        display: none;
        flex-direction: column;
        align-items: flex-start;
        padding: var(--space-5) 1rem var(--space-6);
        background: var(--color-bg);
        border-bottom: 1px solid var(--color-divider);
      }
      .site-nav.open { display: flex; }
      .menu-toggle {
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }
      .header-actions .btn { display: none; }
      .grid-3,
      .two-column,
      .footer-grid,
      .cta-panel {
        grid-template-columns: 1fr;
      }
      .section-head {
        flex-direction: column;
        align-items: flex-start;
      }
    }
  </style>
</head>

  <script>document.documentElement.classList.add("js");</script>

      <a class="brand" href="index.html" aria-label="CRN Solutions home">

  </header>

  <main>
    <!-- Hero -->
    <section class="hero" data-reveal>
      <div class="container hero-grid">
        <div>
          <a href="training.html#courses" class="btn btn-secondary" style="min-height: 0; padding-inline: var(--space-4); padding-block: 0.4rem; font-size: var(--text-xs); margin-bottom: var(--space-3);">
            ← Back to training overview
          </a>
          <div class="kicker">Pragmatic AI series</div>
          <h1>Practical AI
